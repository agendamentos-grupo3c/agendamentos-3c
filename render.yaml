# Blueprint de deploy do backend na Render.
# O frontend é implantado na Vercel (root directory = frontend).
services:
  - type: web
    name: 3c-integracoes-api
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    # Roda as migrations antes de cada deploy (requer plano pago; caso contrário,
    # rode `npm run migrate` manualmente).
    preDeployCommand: npm run migrate
    envVars:
      - key: NODE_ENV
        value: production
      # Segredos: defina no painel da Render (sync:false = não versionado).
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_CALENDAR_REFRESH_TOKEN
        sync: false
      - key: ALLOWED_DOMAIN
        value: grupo-3c.com
      - key: ALLOWLIST_EMAILS
        sync: false
      - key: CALENDAR_ALANA_ID
        sync: false
      - key: CALENDAR_GUILHERME_ID
        sync: false
      # Implantadores (donos das agendas de treinamento).
      - key: CALENDAR_GABRIELLE_ID
        sync: false
      - key: CALENDAR_BRYAN_ID
        sync: false
      - key: CALENDAR_WAGNER_ID
        sync: false
      # HubSpot (implantação): Private App token.
      - key: HUBSPOT_TOKEN
        sync: false
      # Webhooks n8n (Slack/WhatsApp/ClickUp/ClickSign tratados no n8n da 3C).
      - key: N8N_IMPLANTACAO_WEBHOOK
        sync: false
      - key: N8N_INTEGRACAO_WEBHOOK
        sync: false
      # ClickSign + boleto do orçamento de integração (fluxo n8n de outro setor).
      - key: N8N_CLICKSIGN_WEBHOOK
        sync: false
      # Chave máquina-a-máquina p/ o n8n chamar POST /integracao/atribuir.
      - key: INTEGRACAO_API_KEY
        sync: false
